name: Build and test all supported branches

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    
jobs:
  trigger-branch-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger workflows in other branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branches=("scarthgap-next" "kirkstone-next" "styhead-next")
          run_urls=()
          for branch in "${branches[@]}"; do
            output=$(gh workflow run build-test-recipe.yml --ref $branch)
            run_url=$(echo "$output" | grep -oP 'https://github.com/.+/actions/runs/\d+')
            run_urls+=("$run_url")
            echo "Triggered workflow for $branch with run URL: $run_url"
          done
          echo "run_urls=${run_urls[*]}" >> $GITHUB_ENV

      - name: Wait for branch workflows to complete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=' ' read -ra run_urls <<< "${{ env.run_urls }}"
          max_attempts=90  # Maximum 90 min exec time
          
          for attempt in $(seq 1 $max_attempts); do
            all_completed=true
            for run_url in "${run_urls[@]}"; do
              run_id=$(echo "$run_url" | grep -oP '\d+$')
              status=$(gh run view $run_id --json status --jq '.status')
              if [ "$status" != "completed" ]; then
                all_completed=false
                break
              fi
            done
            
            if $all_completed; then
              echo "All branch workflows have completed."
              break
            fi
            
            if [ $attempt -eq $max_attempts ]; then
              echo "Timeout waiting for workflows to complete."
              exit 1
            fi
            
            echo "Waiting for workflows to complete... (Attempt $attempt/$max_attempts)"
            sleep 60
          done

      - name: Report status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "All branch workflows have completed."
          IFS=' ' read -ra run_urls <<< "${{ env.run_urls }}"
          for run_url in "${run_urls[@]}"; do
            run_id=$(echo "$run_url" | grep -oP '\d+$')
            run_info=$(gh run view $run_id --json headBranch,conclusion)
            branch=$(echo "$run_info" | jq -r '.headBranch')
            conclusion=$(echo "$run_info" | jq -r '.conclusion')
            echo "Branch $branch workflow conclusion: $conclusion"
          done
