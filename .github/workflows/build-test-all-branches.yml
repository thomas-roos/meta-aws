name: Build and test all supported branches

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    
jobs:
  trigger-branch-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger workflows in other branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x  # Enable command echo for debugging
          branches=("scarthgap-next" "kirkstone-next" "styhead-next")
          run_urls=()
          for branch in "${branches[@]}"; do
            echo "Attempting to trigger workflow for branch: $branch"
            
            # List workflows to ensure build-test-recipe.yml exists
            echo "Available workflows:"
            gh workflow list
            
            # Check if the branch exists
            if ! gh api repos/${{ github.repository }}/branches/$branch &>/dev/null; then
              echo "Branch $branch does not exist!"
              continue
            fi
            
            # Attempt to run the workflow
            output=$(gh workflow run build-test-recipe.yml --ref $branch 2>&1)
            exit_code=$?
            echo "Command output:"
            echo "$output"
            echo "Exit code: $exit_code"
            
            if [ $exit_code -ne 0 ]; then
              echo "Error triggering workflow for $branch"
              continue
            fi
            
            run_url=$(echo "$output" | grep -oP 'https://github.com/.+/actions/runs/\d+')
            if [ -z "$run_url" ]; then
              echo "Failed to extract run URL for $branch"
              continue
            fi
            
            run_urls+=("$run_url")
            echo "Triggered workflow for $branch with run URL: $run_url"
          done
    
          if [ ${#run_urls[@]} -eq 0 ]; then
            echo "No workflows were successfully triggered"
            exit 1
          fi
    
          echo "run_urls=${run_urls[*]}" >> $GITHUB_ENV

      - name: Wait for branch workflows to complete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branches=("develop" "feature-branch")
          max_attempts=90  # Maximum 90 min exec time
          
          for attempt in $(seq 1 $max_attempts); do
            all_completed=true
            for branch in "${branches[@]}"; do
              status=$(gh run list --workflow=build-test-recipe.yml --branch=$branch --limit 1 --json status --jq '.[0].status')
              if [ "$status" != "completed" ]; then
                all_completed=false
                break
              fi
            done
            
            if $all_completed; then
              echo "All branch workflows have completed."
              break
            fi
            
            if [ $attempt -eq $max_attempts ]; then
              echo "Timeout waiting for workflows to complete."
              exit 1
            fi
            
            echo "Waiting for workflows to complete... (Attempt $attempt/$max_attempts)"
            sleep 60
          done

      - name: Report status
        run: |
          echo "All branch workflows have completed."
          for branch in "${branches[@]}"; do
            conclusion=$(gh run list --workflow=build-test-recipe.yml --branch=$branch --json conclusion --jq '.[0].conclusion')
            echo "Branch $branch workflow conclusion: $conclusion"
          done
