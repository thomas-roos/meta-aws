
DISTRO = "aws-ec2-ami"
DISTRO_NAME = "ec2 ami distro"

require conf/distro/poky.conf

INHERIT += "extrausers"
# Hardening: Locking the root password. Creating the user without password for ssh key-based login only
EXTRA_USERS_PARAMS = "usermod -L root; useradd -p '*' user"
EXTRA_IMAGE_FEATURES:append = "ssh-server-openssh"
# Forcing removal of debug-tweakes as that leads to reversing some sshd_config hardening done in our bbappend when do_rootfs runs
EXTRA_IMAGE_FEATURES:remove = "debug-tweaks"
IMAGE_INSTALL:append = " rng-tools aws-cli cloud-init cloud-init-systemd e2fsprogs e2fsprogs-resize2fs e2fsprogs-tune2fs e2fsprogs-e2fsck e2fsprogs-mke2fs parted sudo sudo-sudo openssh-sftp-server"
IMAGE_FSTYPES += " wic wic.vhdx"
DISTRO_FEATURES:append = " systemd"
DISTRO_FEATURES:append = " virtualization"

DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "shadow-base"
VIRTUAL-RUNTIME_dev_manager = "systemd"

# TODO necessary? Do we really want to directly upload within the build process?
# those are required to create and upload the image to aws
# HOSTTOOLS:append = "jq aws"
